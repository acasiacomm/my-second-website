<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>3D建模平台</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    
    <style>
      :root { --brand-color: #FFDE00; --dark-bg: #1a1a1a; }
      body { margin: 0; overflow: hidden; background-color: var(--dark-bg); font-family: sans-serif; }
      
      #overlay {
        position: absolute; z-index: 999; top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--dark-bg); display: flex; flex-direction: column;
        justify-content: center; align-items: center; transition: opacity 0.8s ease;
      }
      
      h1 { color: var(--brand-color); font-size: 2.5rem; font-weight: 900; text-transform: uppercase; text-align: center; }
      
      #start-btn {
        margin-top: 2rem; padding: 18px 50px; font-weight: bold; font-size: 1.2rem;
        background: var(--brand-color); border: none; border-radius: 50px; cursor: pointer;
      }
      
      .loading-hint { color: #777; margin-top: 15px; font-size: 0.8rem; text-align: center; }

      /* 版權樣式調整：z-index 設為 1000 以確保在首頁 overlay 之上 */
      #footer {
        position: absolute;
        bottom: 10px;
        width: 100%;
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.8rem;
        z-index: 1000; 
        pointer-events: none;
      }
    </style>

    <script>
      AFRAME.registerComponent('model-handler', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            const box = new THREE.Box3().setFromObject(mesh);
            const size = box.getSize(new THREE.Vector3());
            
            const idealHeight = 0.1; 
            if (size.y > 0) {
              const scaleFactor = idealHeight / size.y;
              this.el.setAttribute('scale', `${scaleFactor} ${scaleFactor} ${scaleFactor}`);
            }

            this.el.setAttribute('animation-mixer', {
              clip: '*',
              loop: 'repeat',
              timeScale: 1
            });
          });
        }
      });

      window.onload = () => {
        const btn = document.getElementById('start-btn');
        btn.addEventListener('click', () => {
          document.getElementById('overlay').style.opacity = '0';
          setTimeout(() => document.getElementById('overlay').style.display = 'none', 800);
        });
      };
    </script>
  </head>
  <body>

    <div id="overlay">
      <h1>3D建模平台</h1>
      <button id="start-btn">開始體驗</button>
      <div class="loading-hint">手機操作：雙指縮放可拉近觀看模型動畫</div>
    </div>

    <div id="footer">
      Copyright © Benny
    </div>

    <a-scene 
      renderer="antialias: true; colorManagement: true; exposure: 1.2;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="my-model" src="untitled.glb"></a-asset-item>
      </a-assets>

      <a-sky color="#050505"></a-sky>
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1.2"></a-light>

      <a-entity 
        id="island-model"
        gltf-model="#my-model" 
        position="0 0 0"  
        model-handler>
      </a-entity>

      <a-grid material="opacity: 0.05; transparent: true; color: #FFDE00" cell-size="10"></a-grid>

      <a-entity 
        camera 
        id="mainCamera"
        orbit-controls="
          target: 0 0 0;
          initialPosition: 0 0.5 70.0;
          minDistance: 0.05;
          maxDistance: 200;
          enableDamping: true;
          dampingFactor: 0.1;
        "
        look-controls="enabled: false">
      </a-entity>

    </a-scene>

  </body>
</html>
